adb:
  executable: auto
  serial: 127.0.0.1:16448
  mumu:
    cli: D:\APP\MuMuPlayer\nx_main\mumu-cli.exe
    index: 2
    auto_connect: true

runtime:
  interval_seconds: 30
  dry_run: false
  max_swipes_per_tab: 4
